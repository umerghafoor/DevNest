name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Build desktop (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            os: ubuntu-latest
            artifact_name: linux-bundles
          - name: macos
            os: macos-latest
            artifact_name: macos-bundles
          - name: windows
            os: windows-latest
            artifact_name: windows-bundles
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - run: npm ci
      - run: npm run package

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # <--- add this step!
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "DevNest main ${SHORT_SHA}" \
              --notes "Automated release from main (${GITHUB_SHA})."
          fi

          find release-assets -type f -exec gh release upload "$TAG" {} --clobber \;
